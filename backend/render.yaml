services:
  - type: web
    name: aethrium-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: E2B_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: N8N_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
